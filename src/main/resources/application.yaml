spring:
  application:
    name: tempagent

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

tempagent:
  ai:
    enabled: false
  template:
    placeholder-pattern: "\\{\\{\\s*([a-zA-Z0-9_.-]+)\\s*\\}\\}"
    each-start-pattern: "\\{\\{#each\\s+([a-zA-Z0-9_.-]+)\\}\\}"
    each-end-token: "{{/each}}"
    missing-value-policy: KEEP_TOKEN

